<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>⏳ شمارش معکوس خون‌آلود</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />

    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0000;
            font-family: 'Orbitron', 'Segoe UI', sans-serif;
            padding: 1rem;
            position: relative;
            overflow: hidden;
        }

        /* ===== BLOODY BACKGROUND ===== */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 30% 20%, rgba(180, 0, 0, 0.35) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(200, 0, 0, 0.25) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 0, 0, 0.08) 0%, transparent 70%);
            z-index: 0;
            animation: bgPulse 4s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%,
            100% {
                opacity: 0.6;
            }
            50% {
                opacity: 1;
            }
        }

        /* ===== BLOOD PARTICLES ===== */
        .particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 0, 0, 0.5), transparent);
            animation: floatParticle linear infinite;
        }

        .particle:nth-child(1) {
            left: 8%;
            width: 8px;
            height: 8px;
            animation-duration: 12s;
            animation-delay: 0s;
        }
        .particle:nth-child(2) {
            left: 22%;
            width: 5px;
            height: 5px;
            animation-duration: 15s;
            animation-delay: 2s;
        }
        .particle:nth-child(3) {
            left: 40%;
            width: 10px;
            height: 10px;
            animation-duration: 10s;
            animation-delay: 4s;
        }
        .particle:nth-child(4) {
            left: 58%;
            width: 6px;
            height: 6px;
            animation-duration: 14s;
            animation-delay: 1s;
        }
        .particle:nth-child(5) {
            left: 75%;
            width: 7px;
            height: 7px;
            animation-duration: 11s;
            animation-delay: 3s;
        }
        .particle:nth-child(6) {
            left: 90%;
            width: 9px;
            height: 9px;
            animation-duration: 13s;
            animation-delay: 5s;
        }
        .particle:nth-child(7) {
            left: 50%;
            width: 12px;
            height: 12px;
            animation-duration: 16s;
            animation-delay: 2.5s;
        }
        .particle:nth-child(8) {
            left: 15%;
            width: 4px;
            height: 4px;
            animation-duration: 9s;
            animation-delay: 4.5s;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) scale(0) rotate(0deg);
                opacity: 0;
            }
            15% {
                opacity: 1;
            }
            85% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) scale(1.5) rotate(720deg);
                opacity: 0;
            }
        }

        /* ===== BLOOD DRIPS ===== */
        .drips-container {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .drip-line {
            position: absolute;
            top: -50px;
            width: 3px;
            background: linear-gradient(180deg, rgba(200, 0, 0, 0.7), rgba(255, 0, 0, 0.1));
            border-radius: 0 0 50% 50%;
            animation: dripDown linear infinite;
        }

        .drip-line:nth-child(1) {
            left: 5%;
            height: 80px;
            animation-duration: 4.5s;
            animation-delay: 0s;
        }
        .drip-line:nth-child(2) {
            left: 20%;
            height: 55px;
            animation-duration: 3.8s;
            animation-delay: 1.8s;
        }
        .drip-line:nth-child(3) {
            left: 35%;
            height: 95px;
            animation-duration: 5.2s;
            animation-delay: 0.6s;
        }
        .drip-line:nth-child(4) {
            left: 52%;
            height: 65px;
            animation-duration: 4.1s;
            animation-delay: 2.5s;
        }
        .drip-line:nth-child(5) {
            left: 70%;
            height: 85px;
            animation-duration: 3.5s;
            animation-delay: 1.2s;
        }
        .drip-line:nth-child(6) {
            left: 88%;
            height: 60px;
            animation-duration: 4.8s;
            animation-delay: 3.2s;
        }

        @keyframes dripDown {
            0% {
                transform: translateY(0) scaleY(1);
                opacity: 0;
            }
            15% {
                opacity: 0.8;
            }
            85% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(110vh) scaleY(0.3);
                opacity: 0;
            }
        }

        /* ===== MAIN CARD ===== */
        .glass-card {
            position: relative;
            z-index: 1;
            background: linear-gradient(145deg, rgba(30, 0, 0, 0.92), rgba(10, 0, 0, 0.97));
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 3.5rem;
            padding: 3rem 3rem 2.5rem;
            max-width: 850px;
            width: 100%;
            border: 1px solid rgba(255, 0, 0, 0.12);
            box-shadow:
                0 50px 120px rgba(0, 0, 0, 0.8),
                0 0 80px rgba(200, 0, 0, 0.06),
                inset 0 1px 0 rgba(255, 0, 0, 0.08);
            text-align: center;
            animation: cardGlow 3s ease-in-out infinite;
        }

        @keyframes cardGlow {
            0%,
            100% {
                box-shadow: 0 50px 120px rgba(0, 0, 0, 0.8), 0 0 60px rgba(200, 0, 0, 0.05);
            }
            50% {
                box-shadow: 0 50px 120px rgba(0, 0, 0, 0.8), 0 0 120px rgba(200, 0, 0, 0.12), 0 0 180px rgba(200, 0, 0, 0.05);
            }
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            margin-bottom: 0.3rem;
        }

        .header-icon {
            font-size: 2.8rem;
            color: #ff1111;
            animation: skullPulse 2s ease-in-out infinite;
            text-shadow: 0 0 50px rgba(255, 0, 0, 0.5);
        }

        .header-icon:last-child {
            animation-delay: 0.7s;
        }

        @keyframes skullPulse {
            0%,
            100% {
                transform: scale(1) rotate(0deg);
                text-shadow: 0 0 40px rgba(255, 0, 0, 0.5);
            }
            50% {
                transform: scale(1.12) rotate(-6deg);
                text-shadow: 0 0 80px rgba(255, 0, 0, 0.9), 0 0 140px rgba(200, 0, 0, 0.5);
            }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(180deg, #ff4444, #cc0000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 5px;
            text-shadow: none;
        }

        .sub-title {
            font-family: 'Segoe UI', sans-serif;
            font-size: 1rem;
            color: rgba(255, 100, 100, 0.35);
            font-weight: 300;
            margin-bottom: 2.5rem;
            letter-spacing: 4px;
        }

        .sub-title i {
            color: #cc0000;
            margin: 0 8px;
        }

        /* ===== TIMER GRID ===== */
        .timer-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.2rem;
            margin-bottom: 2rem;
        }

        .time-unit {
            background: linear-gradient(145deg, rgba(40, 0, 0, 0.6), rgba(10, 0, 0, 0.8));
            border-radius: 2.2rem;
            padding: 1.5rem 0.5rem 1.2rem;
            border: 1px solid rgba(255, 0, 0, 0.08);
            box-shadow:
                inset 0 4px 30px rgba(0, 0, 0, 0.6),
                0 0 40px rgba(200, 0, 0, 0.02);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .time-unit::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 0%, rgba(255, 0, 0, 0.05), transparent 70%);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .time-unit:hover::before {
            opacity: 1;
        }

        .time-unit:hover {
            transform: translateY(-10px) scale(1.03);
            border-color: rgba(255, 0, 0, 0.3);
            box-shadow: 0 20px 60px rgba(200, 0, 0, 0.15), inset 0 4px 30px rgba(0, 0, 0, 0.6);
        }

        .time-unit::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(255, 0, 0, 0.04), transparent, rgba(200, 0, 0, 0.04), transparent);
            animation: rotateShimmer 10s linear infinite;
        }

        @keyframes rotateShimmer {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .number {
            font-family: 'Orbitron', monospace;
            font-size: 4.8rem;
            font-weight: 900;
            color: #ff2222;
            letter-spacing: 4px;
            position: relative;
            z-index: 1;
            display: block;
            line-height: 1.1;
            text-shadow: 0 0 50px rgba(255, 0, 0, 0.2), 0 0 100px rgba(200, 0, 0, 0.1);
            font-variant-numeric: tabular-nums;
        }

        .label {
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: rgba(255, 100, 100, 0.3);
            position: relative;
            z-index: 1;
            display: block;
            margin-top: 6px;
            font-weight: 400;
        }

        /* ===== SPECIAL SECONDS PULSE ===== */
        #seconds {
            color: #ff0000;
            text-shadow:
                0 0 40px rgba(255, 0, 0, 0.5),
                0 0 80px rgba(255, 0, 0, 0.2);
            animation: secondsPulse 0.6s ease-in-out infinite alternate;
        }

        @keyframes secondsPulse {
            0% {
                text-shadow: 0 0 40px rgba(255, 0, 0, 0.5), 0 0 80px rgba(200, 0, 0, 0.2);
                transform: scale(1);
            }
            100% {
                text-shadow: 0 0 70px rgba(255, 0, 0, 1), 0 0 140px rgba(255, 0, 0, 0.5), 0 0 200px rgba(200, 0, 0, 0.3);
                transform: scale(1.04);
            }
        }

        /* ===== FLIP ANIMATION ===== */
        .number.flip {
            animation: flipBlood 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes flipBlood {
            0% {
                transform: perspective(500px) rotateX(-90deg) scale(0.7);
                opacity: 0.2;
                text-shadow: 0 0 120px rgba(255, 0, 0, 0.9);
            }
            60% {
                transform: perspective(500px) rotateX(10deg) scale(1.06);
            }
            100% {
                transform: perspective(500px) rotateX(0deg) scale(1);
                opacity: 1;
            }
        }

        /* ===== PROGRESS BAR ===== */
        .progress-wrap {
            width: 100%;
            height: 5px;
            background: rgba(40, 0, 0, 0.3);
            border-radius: 10px;
            overflow: hidden;
            margin: 0.5rem 0 1.8rem;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .progress-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #660000, #ff0000, #cc0000, #ff2222, #660000);
            background-size: 300% 100%;
            border-radius: 10px;
            animation: progressShimmer 3s linear infinite;
            transition: width 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.3);
        }

        @keyframes progressShimmer {
            0% {
                background-position: 300% 0;
            }
            100% {
                background-position: -300% 0;
            }
        }

        /* ===== STATUS ===== */
        .status {
            font-family: 'Segoe UI', sans-serif;
            font-size: 1.3rem;
            color: rgba(255, 200, 200, 0.7);
            font-weight: 600;
            letter-spacing: 2px;
            padding: 0.8rem 2rem;
            border-radius: 3rem;
            background: rgba(100, 0, 0, 0.07);
            border: 1px solid rgba(255, 0, 0, 0.06);
            animation: statusPulse 2.5s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes statusPulse {
            0%,
            100% {
                border-color: rgba(255, 0, 0, 0.06);
                box-shadow: 0 0 20px rgba(200, 0, 0, 0);
            }
            50% {
                border-color: rgba(255, 0, 0, 0.18);
                box-shadow: 0 0 50px rgba(200, 0, 0, 0.06);
            }
        }

        .status i {
            color: #ff0000;
            margin: 0 12px;
            animation: dripIcon 1.5s ease-in-out infinite;
        }

        @keyframes dripIcon {
            0%,
            100% {
                transform: translateY(0) scale(1);
            }
            50% {
                transform: translateY(5px) scale(0.85);
            }
        }

        .status .highlight {
            color: #ff3333;
            font-weight: 700;
            text-shadow: 0 0 40px rgba(255, 0, 0, 0.3);
        }

        /* ===== CREDIT ===== */
        .credit {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 999;
            font-family: 'Orbitron', 'Arial Black', sans-serif;
            font-size: 1.5rem;
            font-weight: 900;
            color: #cc0000;
            text-shadow:
                0 0 30px rgba(255, 0, 0, 0.4),
                0 0 60px rgba(200, 0, 0, 0.2);
            background: rgba(10, 0, 0, 0.6);
            padding: 0.7rem 1.8rem;
            border-radius: 2.5rem;
            border: 1px solid rgba(200, 0, 0, 0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.04);
            animation: creditGlow 2.5s ease-in-out infinite;
            letter-spacing: 3px;
            transform: rotate(-1.5deg);
            transition: all 0.4s ease;
        }

        .credit:hover {
            transform: rotate(0deg) scale(1.06);
            border-color: rgba(255, 0, 0, 0.4);
            box-shadow: 0 0 80px rgba(255, 0, 0, 0.15);
        }

        @keyframes creditGlow {
            0%,
            100% {
                text-shadow: 0 0 30px rgba(255, 0, 0, 0.4), 0 0 60px rgba(200, 0, 0, 0.2);
                border-color: rgba(200, 0, 0, 0.12);
            }
            50% {
                text-shadow: 0 0 60px rgba(255, 0, 0, 0.8), 0 0 120px rgba(255, 0, 0, 0.4);
                border-color: rgba(255, 0, 0, 0.3);
            }
        }

        .credit i {
            margin: 0 10px;
            color: #ff0000;
            animation: creditSkull 2.5s ease-in-out infinite;
        }

        @keyframes creditSkull {
            0%,
            100% {
                transform: scale(1) rotate(0deg);
            }
            50% {
                transform: scale(1.2) rotate(12deg);
            }
        }

        /* ===== EXPIRED ===== */
        .expired .number {
            color: #ff0000 !important;
            text-shadow: 0 0 70px rgba(255, 0, 0, 0.9), 0 0 140px rgba(200, 0, 0, 0.5) !important;
            animation: expiredFlash 0.8s ease-in-out infinite alternate;
        }

        @keyframes expiredFlash {
            0% {
                text-shadow: 0 0 70px rgba(255, 0, 0, 0.9), 0 0 140px rgba(200, 0, 0, 0.5);
            }
            100% {
                text-shadow: 0 0 120px rgba(255, 0, 0, 1), 0 0 200px rgba(255, 0, 0, 0.7), 0 0 300px rgba(200, 0, 0, 0.4);
            }
        }

        .expired .time-unit {
            border-color: rgba(255, 0, 0, 0.5);
            box-shadow: 0 0 80px rgba(255, 0, 0, 0.15);
        }

        .expired .status {
            color: #ff0000;
            text-shadow: 0 0 60px rgba(255, 0, 0, 0.8);
            border-color: rgba(255, 0, 0, 0.3);
        }

        .expired .glass-card {
            animation: expiredGlow 1s ease-in-out infinite;
        }

        @keyframes expiredGlow {
            0%,
            100% {
                box-shadow: 0 50px 120px rgba(0, 0, 0, 0.8), 0 0 100px rgba(200, 0, 0, 0.2);
            }
            50% {
                box-shadow: 0 50px 120px rgba(0, 0, 0, 0.8), 0 0 180px rgba(200, 0, 0, 0.4);
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .glass-card {
                padding: 2rem 1.5rem;
                border-radius: 2.5rem;
            }
            .number {
                font-size: 3.5rem;
            }
            .timer-grid {
                gap: 0.8rem;
            }
            .credit {
                font-size: 1.1rem;
                padding: 0.5rem 1.2rem;
                bottom: 18px;
                left: 18px;
            }
            h1 {
                font-size: 1.4rem;
                letter-spacing: 3px;
            }
            .status {
                font-size: 1.1rem;
                padding: 0.6rem 1.5rem;
            }
            .header-icon {
                font-size: 2.2rem;
            }
            .time-unit {
                padding: 1.2rem 0.3rem 1rem;
                border-radius: 1.8rem;
            }
        }

        @media (max-width: 480px) {
            .glass-card {
                padding: 1.5rem 0.8rem 1.8rem;
                border-radius: 2rem;
            }
            .number {
                font-size: 2.5rem;
                letter-spacing: 2px;
            }
            .timer-grid {
                gap: 0.5rem;
            }
            .label {
                font-size: 0.55rem;
                letter-spacing: 3px;
            }
            .credit {
                font-size: 0.8rem;
                padding: 0.3rem 0.8rem;
                bottom: 12px;
                left: 12px;
                letter-spacing: 1px;
                border-radius: 1.5rem;
            }
            .credit i {
                margin: 0 5px;
            }
            .status {
                font-size: 0.85rem;
                padding: 0.4rem 1rem;
            }
            h1 {
                font-size: 1rem;
                letter-spacing: 2px;
            }
            .header-icon {
                font-size: 1.6rem;
            }
            .header {
                gap: 10px;
            }
            .sub-title {
                font-size: 0.7rem;
                margin-bottom: 1.5rem;
                letter-spacing: 2px;
            }
            .time-unit {
                padding: 0.8rem 0.2rem 0.7rem;
                border-radius: 1.2rem;
            }
            .progress-wrap {
                height: 4px;
                margin: 0.3rem 0 1.2rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== PARTICLES ===== -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- ===== DRIPS ===== -->
    <div class="drips-container">
        <div class="drip-line"></div>
        <div class="drip-line"></div>
        <div class="drip-line"></div>
        <div class="drip-line"></div>
        <div class="drip-line"></div>
        <div class="drip-line"></div>
    </div>

    <!-- ===== CREDIT ===== -->
    <div class="credit">
        <i class="fas fa-skull"></i>
        ساخته شده با سیک عمیق
        <i class="fas fa-skull"></i>
    </div>

    <!-- ===== MAIN CARD ===== -->
    <div class="glass-card" id="app">
        <!-- HEADER -->
        <div class="header">
            <i class="fas fa-skull header-icon"></i>
            <h1>زمان تموم شده!</h1>
            <i class="fas fa-skull header-icon" style="animation-delay:0.7s;"></i>
        </div>

        <p class="sub-title">
            <i class="fas fa-calendar-alt"></i>
            ۱۷ ژوئیه ۲۰۲۶ — ۱۴:۳۶
            <i class="fas fa-clock"></i>
        </p>

        <!-- TIMER -->
        <div class="timer-grid">
            <div class="time-unit">
                <span class="number" id="days">۰۰</span>
                <span class="label">روز</span>
            </div>
            <div class="time-unit">
                <span class="number" id="hours">۰۰</span>
                <span class="label">ساعت</span>
            </div>
            <div class="time-unit">
                <span class="number" id="minutes">۰۰</span>
                <span class="label">دقیقه</span>
            </div>
            <div class="time-unit">
                <span class="number" id="seconds">۰۰</span>
                <span class="label">ثانیه</span>
            </div>
        </div>

        <!-- PROGRESS -->
        <div class="progress-wrap">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- STATUS -->
        <div class="status" id="statusMessage">
            <i class="fas fa-tint"></i>
            بدو الناز سریع تحویل بده
            <i class="fas fa-tint"></i>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            const TARGET = new Date('2026-07-17T14:36:00+03:30');

            const daysEl = document.getElementById('days');
            const hoursEl = document.getElementById('hours');
            const minutesEl = document.getElementById('minutes');
            const secondsEl = document.getElementById('seconds');
            const progressBar = document.getElementById('progressBar');
            const statusMsg = document.getElementById('statusMessage');
            const appCard = document.getElementById('app');

            let prev = {
                days: '--',
                hours: '--',
                minutes: '--',
                seconds: '--'
            };

            function pad(n) {
                return String(n).padStart(2, '0');
            }

            function animateElement(el, value, prevValue) {
                if (value !== prevValue) {
                    el.textContent = value;
                    el.classList.remove('flip');
                    void el.offsetWidth;
                    el.classList.add('flip');
                } else {
                    el.textContent = value;
                }
            }

            function updateTimer() {
                const now = new Date();
                const diffMs = TARGET.getTime() - now.getTime();

                if (diffMs <= 0) {
                    daysEl.textContent = '۰۰';
                    hoursEl.textContent = '۰۰';
                    minutesEl.textContent = '۰۰';
                    secondsEl.textContent = '۰۰';
                    progressBar.style.width = '100%';
                    statusMsg.innerHTML = `
                        <i class="fas fa-skull"></i>
                        <span style="color:#ff0000; font-weight:700;">وقت تموم شد! الناز دیره!</span>
                        <i class="fas fa-skull"></i>
                    `;
                    appCard.classList.add('expired');
                    return;
                }

                appCard.classList.remove('expired');

                const totalSec = Math.floor(diffMs / 1000);
                const days = Math.floor(totalSec / 86400);
                const hours = Math.floor((totalSec % 86400) / 3600);
                const minutes = Math.floor((totalSec % 3600) / 60);
                const seconds = totalSec % 60;

                const dStr = pad(days);
                const hStr = pad(hours);
                const mStr = pad(minutes);
                const sStr = pad(seconds);

                animateElement(daysEl, dStr, prev.days);
                animateElement(hoursEl, hStr, prev.hours);
                animateElement(minutesEl, mStr, prev.minutes);
                animateElement(secondsEl, sStr, prev.seconds);

                prev.days = dStr;
                prev.hours = hStr;
                prev.minutes = mStr;
                prev.seconds = sStr;

                const startRange = new Date('2026-01-01T00:00:00+03:30');
                const endRange = TARGET;
                const totalRangeMs = endRange.getTime() - startRange.getTime();
                const elapsedMs = now.getTime() - startRange.getTime();
                let progress = Math.min(elapsedMs / totalRangeMs, 1);
                progress = Math.max(progress, 0);
                progressBar.style.width = (progress * 100) + '%';

                const msgs = [
                    '🩸 بدو الناز سریع تحویل بده 🩸',
                    '⚡ الناز! وقت کمه! ⚡',
                    '🔥 الناز بدو! 🔥',
                    '💀 الناز! داری دیر میشه! 💀'
                ];
                const cycleIndex = Math.floor(now.getTime() / 10000) % msgs.length;
                statusMsg.innerHTML = `
                    <i class="fas fa-tint"></i>
                    ${msgs[cycleIndex]}
                    <i class="fas fa-tint"></i>
                `;
            }

            updateTimer();
            setInterval(updateTimer, 1000);

            document.addEventListener('visibilitychange', function() {
                if (!document.hidden) updateTimer();
            });

        })();
    </script>

</body>
</html>

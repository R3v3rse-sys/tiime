<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>⏳ شمارش معکوس خون‌آلود - دقیق</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0000;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            padding: 1rem;
            position: relative;
            overflow-x: hidden;
        }

        /* ===== BLOODY BACKGROUND ===== */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(180, 0, 0, 0.25) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(200, 0, 0, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(255, 0, 0, 0.08) 0%, transparent 40%);
            z-index: 0;
            pointer-events: none;
            animation: bloodPulse 3s ease-in-out infinite;
        }

        @keyframes bloodPulse {
            0%,
            100% {
                opacity: 0.7;
            }
            50% {
                opacity: 1;
            }
        }

        /* ===== BLOOD DRIPS ===== */
        .blood-drips {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .drip {
            position: absolute;
            top: -100px;
            width: 4px;
            background: linear-gradient(to bottom, rgba(180, 0, 0, 0.8), rgba(255, 0, 0, 0.3));
            border-radius: 0 0 50% 50%;
            animation: dripFall linear infinite;
        }

        .drip:nth-child(1) { left: 5%; height: 80px; animation-duration: 4.2s; animation-delay: 0s; }
        .drip:nth-child(2) { left: 15%; height: 60px; animation-duration: 3.8s; animation-delay: 1.5s; }
        .drip:nth-child(3) { left: 30%; height: 100px; animation-duration: 5s; animation-delay: 0.8s; }
        .drip:nth-child(4) { left: 50%; height: 70px; animation-duration: 4.5s; animation-delay: 2.2s; }
        .drip:nth-child(5) { left: 65%; height: 90px; animation-duration: 3.5s; animation-delay: 1.2s; }
        .drip:nth-child(6) { left: 80%; height: 50px; animation-duration: 4.8s; animation-delay: 0.3s; }
        .drip:nth-child(7) { left: 92%; height: 75px; animation-duration: 3.9s; animation-delay: 1.9s; }
        .drip:nth-child(8) { left: 45%; height: 110px; animation-duration: 5.2s; animation-delay: 0.6s; }

        @keyframes dripFall {
            0% { transform: translateY(0) scaleY(1); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.8; }
            100% { transform: translateY(110vh) scaleY(0.5); opacity: 0; }
        }

        /* ===== SPLASH ===== */
        .splash {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(200, 0, 0, 0.15), transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: splashFloat 8s ease-in-out infinite;
        }

        .splash:nth-child(1) { width: 300px; height: 300px; top: 10%; left: -5%; animation-delay: 0s; }
        .splash:nth-child(2) { width: 400px; height: 400px; bottom: -10%; right: -10%; animation-delay: 3s; }
        .splash:nth-child(3) { width: 200px; height: 200px; top: 50%; left: 50%; animation-delay: 1.5s; }

        @keyframes splashFloat {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.3; }
            50% { transform: scale(1.5) rotate(180deg); opacity: 0.6; }
        }

        /* ===== MAIN CARD ===== */
        .glass-card {
            position: relative;
            z-index: 1;
            background: rgba(20, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 2.5rem;
            padding: 2rem 2rem 2.5rem;
            max-width: 950px;
            width: 100%;
            border: 2px solid rgba(200, 0, 0, 0.3);
            box-shadow:
                0 30px 80px rgba(180, 0, 0, 0.3),
                inset 0 0 60px rgba(255, 0, 0, 0.05),
                0 0 100px rgba(255, 0, 0, 0.1);
            text-align: center;
            animation: cardGlow 2s ease-in-out infinite;
        }

        @keyframes cardGlow {
            0%, 100% { box-shadow: 0 30px 80px rgba(180, 0, 0, 0.3), 0 0 60px rgba(255, 0, 0, 0.1); }
            50% { box-shadow: 0 30px 80px rgba(200, 0, 0, 0.5), 0 0 100px rgba(255, 0, 0, 0.2); }
        }

        .glass-card:hover {
            transform: scale(1.01);
        }

        /* ===== HEADER ===== */
        .header-icon {
            font-size: 2.8rem;
            color: #cc0000;
            display: inline-block;
            animation: pulse-icon 1.5s infinite ease-in-out;
            text-shadow: 0 0 40px rgba(255, 0, 0, 0.5);
        }

        @keyframes pulse-icon {
            0%, 100% { transform: scale(1); text-shadow: 0 0 40px rgba(255, 0, 0, 0.5); }
            50% { transform: scale(1.15) rotate(4deg); text-shadow: 0 0 80px rgba(255, 0, 0, 0.8); }
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 300;
            color: rgba(255, 200, 200, 0.9);
            letter-spacing: 1px;
            margin: 0.2rem 0;
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.2);
        }

        .sub-title {
            font-size: 0.9rem;
            color: rgba(255, 100, 100, 0.5);
            font-weight: 300;
            margin-bottom: 1.5rem;
            letter-spacing: 2px;
        }

        .sub-title i {
            margin: 0 6px;
            color: #cc0000;
        }

        /* ===== TIMER GRID - MAIN ===== */
        .timer-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.8rem;
            margin-bottom: 1.2rem;
        }

        .time-unit {
            background: rgba(60, 0, 0, 0.4);
            border-radius: 1.5rem;
            padding: 0.8rem 0.2rem;
            border: 1px solid rgba(200, 0, 0, 0.2);
            box-shadow: inset 0 4px 20px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .time-unit::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(255, 0, 0, 0.05), transparent, rgba(200, 0, 0, 0.05), transparent);
            animation: rotate-shimmer 6s linear infinite;
        }

        @keyframes rotate-shimmer {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .time-unit:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 0, 0, 0.5);
            box-shadow: 0 10px 40px rgba(255, 0, 0, 0.2);
        }

        .number {
            font-size: 3.2rem;
            font-weight: 700;
            color: #ff2222;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
            display: block;
            line-height: 1.2;
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.4), 0 0 60px rgba(200, 0, 0, 0.2);
        }

        .label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 100, 100, 0.4);
            position: relative;
            z-index: 1;
            display: block;
            margin-top: 2px;
            font-weight: 400;
        }

        /* ===== MICRO SECONDS GRID ===== */
        .micro-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 0.4rem;
            margin: 0.8rem 0 1.2rem;
        }

        .micro-unit {
            background: rgba(40, 0, 0, 0.3);
            border-radius: 0.8rem;
            padding: 0.3rem 0.1rem;
            border: 1px solid rgba(200, 0, 0, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .micro-unit:hover {
            border-color: rgba(255, 0, 0, 0.3);
            transform: translateY(-2px);
        }

        .micro-number {
            font-size: 1.6rem;
            font-weight: 700;
            color: #ff3333;
            position: relative;
            z-index: 1;
            display: block;
            line-height: 1.2;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
            font-variant-numeric: tabular-nums;
        }

        .micro-label {
            font-size: 0.45rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 100, 100, 0.3);
            position: relative;
            z-index: 1;
            display: block;
            margin-top: 1px;
        }

        /* ===== SPECIAL - MOST PRECISE ===== */
        #micro6 {
            color: #ff0000;
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.8), 0 0 60px rgba(200, 0, 0, 0.4);
            animation: microPulse 0.1s ease-in-out infinite alternate;
        }

        @keyframes microPulse {
            0% { text-shadow: 0 0 30px rgba(255, 0, 0, 0.8), 0 0 60px rgba(200, 0, 0, 0.4); transform: scale(1); }
            100% { text-shadow: 0 0 50px rgba(255, 0, 0, 1), 0 0 100px rgba(255, 0, 0, 0.6); transform: scale(1.04); }
        }

        .number.flip, .micro-number.flip {
            animation: flip-pop-blood 0.2s ease;
        }

        @keyframes flip-pop-blood {
            0% { transform: scale(1.3); opacity: 0.4; text-shadow: 0 0 80px rgba(255, 0, 0, 1); }
            60% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* ===== PROGRESS BAR ===== */
        .progress-wrap {
            width: 100%;
            height: 5px;
            background: rgba(60, 0, 0, 0.3);
            border-radius: 10px;
            overflow: hidden;
            margin: 0.8rem 0 1.2rem;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(200, 0, 0, 0.1);
        }

        .progress-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #8b0000, #ff0000, #cc0000, #ff2222, #8b0000);
            background-size: 200% 100%;
            border-radius: 10px;
            animation: shimmer-progress 2s linear infinite;
            transition: width 0.5s ease;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
        }

        @keyframes shimmer-progress {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ===== STATUS MESSAGE ===== */
        .status {
            font-size: 1.2rem;
            color: rgba(255, 200, 200, 0.8);
            font-weight: 600;
            letter-spacing: 2px;
            margin-top: 0.2rem;
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
            animation: bloodText 1s ease-in-out infinite alternate;
            padding: 0.4rem;
            border-radius: 1rem;
            background: rgba(100, 0, 0, 0.15);
            border: 1px solid rgba(255, 0, 0, 0.1);
        }

        @keyframes bloodText {
            0% { text-shadow: 0 0 20px rgba(255, 0, 0, 0.2); color: rgba(255, 200, 200, 0.7); }
            100% { text-shadow: 0 0 40px rgba(255, 0, 0, 0.6), 0 0 80px rgba(200, 0, 0, 0.3); color: #ff4444; }
        }

        .status i {
            color: #ff0000;
            margin: 0 8px;
            animation: iconDrip 1.2s ease-in-out infinite;
        }

        @keyframes iconDrip {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(5px) scale(0.9); }
        }

        /* ===== CREDIT ===== */
        .credit {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 999;
            font-size: 1.6rem;
            font-weight: 900;
            color: #cc0000;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.6), 0 0 40px rgba(255, 0, 0, 0.4), 0 0 80px rgba(200, 0, 0, 0.3);
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            letter-spacing: 2px;
            animation: creditPulse 1.5s ease-in-out infinite alternate;
            background: rgba(10, 0, 0, 0.7);
            padding: 0.5rem 1.2rem;
            border-radius: 1.5rem;
            border: 2px solid rgba(200, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.15);
            transform: rotate(-2deg);
        }

        .credit:hover {
            transform: rotate(0deg) scale(1.05);
            border-color: rgba(255, 0, 0, 0.6);
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.3);
        }

        @keyframes creditPulse {
            0% { text-shadow: 0 0 20px rgba(255, 0, 0, 0.6); color: #cc0000; }
            100% { text-shadow: 0 0 40px rgba(255, 0, 0, 1), 0 0 80px rgba(255, 0, 0, 0.6); color: #ff2222; }
        }

        .credit i {
            margin: 0 6px;
            color: #ff0000;
            animation: creditIcon 2s ease-in-out infinite;
        }

        @keyframes creditIcon {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.3) rotate(10deg); }
        }

        /* ===== EXPIRED ===== */
        .expired .number, .expired .micro-number {
            color: #ff0000 !important;
            text-shadow: 0 0 60px rgba(255, 0, 0, 0.8), 0 0 120px rgba(200, 0, 0, 0.5) !important;
        }

        .expired .time-unit, .expired .micro-unit {
            border-color: rgba(255, 0, 0, 0.5);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.2);
        }

        .expired .status {
            color: #ff0000;
            text-shadow: 0 0 60px rgba(255, 0, 0, 0.8);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .glass-card { padding: 1.5rem 1rem 2rem; }
            .number { font-size: 2.4rem; }
            .micro-number { font-size: 1.2rem; }
            .timer-grid { gap: 0.5rem; }
            .micro-grid { gap: 0.3rem; }
            .credit { font-size: 1.2rem; padding: 0.4rem 1rem; bottom: 10px; left: 10px; }
            .status { font-size: 1rem; }
            h1 { font-size: 1.2rem; }
        }

        @media (max-width: 480px) {
            .glass-card { padding: 1rem 0.6rem 1.5rem; border-radius: 1.5rem; }
            .number { font-size: 1.8rem; }
            .micro-number { font-size: 0.9rem; }
            .timer-grid { gap: 0.3rem; }
            .micro-grid { gap: 0.2rem; }
            .label { font-size: 0.5rem; letter-spacing: 1px; }
            .micro-label { font-size: 0.35rem; }
            .credit { font-size: 0.9rem; padding: 0.3rem 0.7rem; bottom: 6px; left: 6px; }
            .status { font-size: 0.8rem; padding: 0.3rem; }
            h1 { font-size: 1rem; }
            .header-icon { font-size: 2rem; }
            .sub-title { font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <!-- ===== BLOOD DRIPS ===== -->
    <div class="blood-drips">
        <div class="drip"></div>
        <div class="drip"></div>
        <div class="drip"></div>
        <div class="drip"></div>
        <div class="drip"></div>
        <div class="drip"></div>
        <div class="drip"></div>
        <div class="drip"></div>
    </div>

    <!-- ===== SPLASHES ===== -->
    <div class="splash"></div>
    <div class="splash"></div>
    <div class="splash"></div>

    <!-- ===== CREDIT ===== -->
    <div class="credit">
        <i class="fas fa-skull"></i>
        ساخته شده با سیک عمیق
        <i class="fas fa-skull"></i>
    </div>

    <!-- ===== MAIN CARD ===== -->
    <div class="glass-card" id="app">
        <div class="header-icon">
            <i class="fas fa-skull"></i>
        </div>
        <h1>⏳ زمان تموم شده!</h1>
        <p class="sub-title">
            <i class="fas fa-calendar-alt"></i>
            ۱۷ ژوئیه ۲۰۲۶ — ۱۴:۳۶
            <i class="fas fa-clock"></i>
        </p>

        <!-- ===== MAIN TIMER ===== -->
        <div class="timer-grid" id="timerGrid">
            <div class="time-unit">
                <span class="number" id="days">۰۰</span>
                <span class="label">روز</span>
            </div>
            <div class="time-unit">
                <span class="number" id="hours">۰۰</span>
                <span class="label">ساعت</span>
            </div>
            <div class="time-unit">
                <span class="number" id="minutes">۰۰</span>
                <span class="label">دقیقه</span>
            </div>
            <div class="time-unit">
                <span class="number" id="seconds">۰۰</span>
                <span class="label">ثانیه</span>
            </div>
        </div>

        <!-- ===== MICRO SECONDS ===== -->
        <div class="micro-grid" id="microGrid">
            <div class="micro-unit">
                <span class="micro-number" id="micro1">۰</span>
                <span class="micro-label">دهم</span>
            </div>
            <div class="micro-unit">
                <span class="micro-number" id="micro2">۰</span>
                <span class="micro-label">صدم</span>
            </div>
            <div class="micro-unit">
                <span class="micro-number" id="micro3">۰</span>
                <span class="micro-label">هزارم</span>
            </div>
            <div class="micro-unit">
                <span class="micro-number" id="micro4">۰</span>
                <span class="micro-label">ده‌هزارم</span>
            </div>
            <div class="micro-unit">
                <span class="micro-number" id="micro5">۰</span>
                <span class="micro-label">صد‌هزارم</span>
            </div>
            <div class="micro-unit">
                <span class="micro-number" id="micro6">۰</span>
                <span class="micro-label">میلیونوم</span>
            </div>
        </div>

        <!-- ===== PROGRESS ===== -->
        <div class="progress-wrap">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- ===== STATUS ===== -->
        <div class="status" id="statusMessage">
            <i class="fas fa-tint"></i>
            بدو الناز سریع تحویل بده
            <i class="fas fa-tint"></i>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ===== TARGET: 17 July 2026, 14:36 IRST =====
            const TARGET = new Date('2026-07-17T14:36:00+03:30');

            // ===== DOM REFS =====
            const daysEl = document.getElementById('days');
            const hoursEl = document.getElementById('hours');
            const minutesEl = document.getElementById('minutes');
            const secondsEl = document.getElementById('seconds');

            const microEls = [
                document.getElementById('micro1'),
                document.getElementById('micro2'),
                document.getElementById('micro3'),
                document.getElementById('micro4'),
                document.getElementById('micro5'),
                document.getElementById('micro6')
            ];

            const progressBar = document.getElementById('progressBar');
            const statusMsg = document.getElementById('statusMessage');
            const appCard = document.getElementById('app');

            // ===== PREV VALUES =====
            let prev = {
                days: '--',
                hours: '--',
                minutes: '--',
                seconds: '--',
                micro: ['--', '--', '--', '--', '--', '--']
            };

            // ===== HELPERS =====
            function pad(n) {
                return String(n).padStart(2, '0');
            }

            function animateElement(el, value, prevValue) {
                if (value !== prevValue) {
                    el.textContent = value;
                    el.classList.remove('flip');
                    void el.offsetWidth;
                    el.classList.add('flip');
                } else {
                    el.textContent = value;
                }
            }

            // ===== UPDATE TIMER =====
            function updateTimer() {
                const now = new Date();
                const diffMs = TARGET.getTime() - now.getTime();

                // --- EXPIRED ---
                if (diffMs <= 0) {
                    daysEl.textContent = '۰۰';
                    hoursEl.textContent = '۰۰';
                    minutesEl.textContent = '۰۰';
                    secondsEl.textContent = '۰۰';
                    microEls.forEach(el => el.textContent = '۰');
                    progressBar.style.width = '100%';
                    statusMsg.innerHTML = `
                        <i class="fas fa-skull"></i>
                        <span style="color:#ff0000; font-weight:700;">وقت تموم شد! الناز دیره!</span>
                        <i class="fas fa-skull"></i>
                    `;
                    appCard.classList.add('expired');
                    return;
                }

                appCard.classList.remove('expired');

                // --- CALCULATE MAIN ---
                const totalSec = Math.floor(diffMs / 1000);
                const days = Math.floor(totalSec / 86400);
                const hours = Math.floor((totalSec % 86400) / 3600);
                const minutes = Math.floor((totalSec % 3600) / 60);
                const seconds = totalSec % 60;

                // --- MICRO SECONDS (fractional) ---
                const fractional = (diffMs % 1000) / 1000; // 0.000 - 0.999
                const micro1 = Math.floor(fractional * 10) % 10;           // دهم
                const micro2 = Math.floor(fractional * 100) % 10;          // صدم
                const micro3 = Math.floor(fractional * 1000) % 10;         // هزارم
                const micro4 = Math.floor(fractional * 10000) % 10;        // ده‌هزارم
                const micro5 = Math.floor(fractional * 100000) % 10;       // صد‌هزارم
                const micro6 = Math.floor(fractional * 1000000) % 10;      // یک‌میلیونوم

                const dStr = pad(days);
                const hStr = pad(hours);
                const mStr = pad(minutes);
                const sStr = pad(seconds);

                const microStr = [
                    String(micro1),
                    String(micro2),
                    String(micro3),
                    String(micro4),
                    String(micro5),
                    String(micro6)
                ];

                // --- UPDATE MAIN ---
                animateElement(daysEl, dStr, prev.days);
                animateElement(hoursEl, hStr, prev.hours);
                animateElement(minutesEl, mStr, prev.minutes);
                animateElement(secondsEl, sStr, prev.seconds);

                // --- UPDATE MICRO ---
                for (let i = 0; i < 6; i++) {
                    animateElement(microEls[i], microStr[i], prev.micro[i]);
                }

                // --- STORE PREV ---
                prev.days = dStr;
                prev.hours = hStr;
                prev.minutes = mStr;
                prev.seconds = sStr;
                prev.micro = microStr;

                // --- PROGRESS ---
                const startRange = new Date('2026-01-01T00:00:00+03:30');
                const endRange = TARGET;
                const totalRangeMs = endRange.getTime() - startRange.getTime();
                const elapsedMs = now.getTime() - startRange.getTime();
                let progress = Math.min(elapsedMs / totalRangeMs, 1);
                progress = Math.max(progress, 0);
                progressBar.style.width = (progress * 100) + '%';

                // --- STATUS MESSAGE ---
                const msgs = [
                    '🩸 بدو الناز سریع تحویل بده 🩸',
                    '⚡ الناز! وقت کمه! ⚡',
                    '🔥 الناز بدو! 🔥',
                    '💀 الناز! داری دیر میشه! 💀'
                ];
                const cycleIndex = Math.floor(now.getTime() / 10000) % msgs.length;
                statusMsg.innerHTML = `
                    <i class="fas fa-tint"></i>
                    ${msgs[cycleIndex]}
                    <i class="fas fa-tint"></i>
                `;
            }

            // ===== START =====
            updateTimer();
            setInterval(updateTimer, 100); // به‌روزرسانی هر ۱۰۰ میلی‌ثانیه برای دقت بالا

            document.addEventListener('visibilitychange', function() {
                if (!document.hidden) updateTimer();
            });

        })();
    </script>

</body>
</html>

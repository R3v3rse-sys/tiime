<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌳 درخت زمان - شمارش معکوس</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;600;900&display=swap" rel="stylesheet" />

    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a1a0a;
            font-family: 'Vazirmatn', 'Segoe UI', sans-serif;
            padding: 1rem;
            position: relative;
            overflow: hidden;
        }

        /* ===== NATURE BACKGROUND ===== */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(34, 139, 34, 0.25) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 70%, rgba(0, 100, 50, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(0, 80, 30, 0.15) 0%, transparent 40%);
            z-index: 0;
            animation: naturePulse 6s ease-in-out infinite;
        }

        @keyframes naturePulse {
            0%,
            100% {
                opacity: 0.6;
            }
            50% {
                opacity: 1;
            }
        }

        /* ===== FALLING LEAVES ===== */
        .leaves-container {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .leaf {
            position: absolute;
            font-size: 1.8rem;
            opacity: 0.5;
            animation: fallLeaf linear infinite;
            transform-origin: center;
        }

        .leaf:nth-child(1) {
            left: 5%;
            animation-duration: 14s;
            animation-delay: 0s;
            font-size: 2rem;
        }
        .leaf:nth-child(2) {
            left: 15%;
            animation-duration: 12s;
            animation-delay: 2s;
            font-size: 1.5rem;
        }
        .leaf:nth-child(3) {
            left: 28%;
            animation-duration: 16s;
            animation-delay: 4s;
            font-size: 2.2rem;
        }
        .leaf:nth-child(4) {
            left: 42%;
            animation-duration: 11s;
            animation-delay: 1s;
            font-size: 1.6rem;
        }
        .leaf:nth-child(5) {
            left: 56%;
            animation-duration: 15s;
            animation-delay: 3s;
            font-size: 2.4rem;
        }
        .leaf:nth-child(6) {
            left: 70%;
            animation-duration: 13s;
            animation-delay: 5s;
            font-size: 1.8rem;
        }
        .leaf:nth-child(7) {
            left: 84%;
            animation-duration: 17s;
            animation-delay: 2.5s;
            font-size: 2rem;
        }
        .leaf:nth-child(8) {
            left: 48%;
            animation-duration: 10s;
            animation-delay: 4.5s;
            font-size: 1.4rem;
        }

        @keyframes fallLeaf {
            0% {
                transform: translateY(-10vh) rotate(0deg) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(110vh) rotate(720deg) scale(1);
                opacity: 0;
            }
        }

        /* ===== BIRDS ===== */
        .birds {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bird {
            position: absolute;
            color: rgba(200, 220, 200, 0.15);
            font-size: 2.5rem;
            animation: flyBird linear infinite;
        }

        .bird:nth-child(1) {
            top: 10%;
            animation-duration: 20s;
            animation-delay: 0s;
            left: -10%;
        }
        .bird:nth-child(2) {
            top: 25%;
            animation-duration: 25s;
            animation-delay: 5s;
            left: -5%;
            font-size: 2rem;
        }
        .bird:nth-child(3) {
            top: 40%;
            animation-duration: 18s;
            animation-delay: 10s;
            left: -15%;
            font-size: 3rem;
        }

        @keyframes flyBird {
            0% {
                transform: translateX(0) translateY(0) scale(1);
            }
            25% {
                transform: translateX(25vw) translateY(-30px) scale(1.1);
            }
            50% {
                transform: translateX(55vw) translateY(20px) scale(0.9);
            }
            75% {
                transform: translateX(80vw) translateY(-15px) scale(1.05);
            }
            100% {
                transform: translateX(110vw) translateY(0) scale(1);
            }
        }

        /* ===== MAIN CARD - NATURE THEME ===== */
        .glass-card {
            position: relative;
            z-index: 1;
            background: linear-gradient(145deg, rgba(20, 60, 20, 0.85), rgba(5, 30, 10, 0.92));
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 3.5rem;
            padding: 3rem 3rem 2.5rem;
            max-width: 850px;
            width: 100%;
            border: 1px solid rgba(50, 200, 50, 0.12);
            box-shadow:
                0 50px 120px rgba(0, 0, 0, 0.6),
                0 0 80px rgba(50, 200, 50, 0.05),
                inset 0 1px 0 rgba(100, 255, 100, 0.06);
            text-align: center;
            animation: cardGlow 4s ease-in-out infinite;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 20%, rgba(50, 255, 50, 0.04), transparent 60%);
            pointer-events: none;
        }

        @keyframes cardGlow {
            0%,
            100% {
                box-shadow: 0 50px 120px rgba(0, 0, 0, 0.6), 0 0 60px rgba(50, 200, 50, 0.03);
            }
            50% {
                box-shadow: 0 50px 120px rgba(0, 0, 0, 0.6), 0 0 120px rgba(50, 200, 50, 0.08), 0 0 200px rgba(50, 200, 50, 0.03);
            }
        }

        /* ===== TREE SVG ===== */
        .tree-container {
            position: relative;
            width: 120px;
            height: 140px;
            margin: 0 auto 1rem;
        }

        .tree-container svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 30px rgba(50, 200, 50, 0.15));
        }

        .tree-trunk {
            fill: #5d3a1a;
        }

        .tree-leaves {
            fill: #2d7d2d;
            transition: all 0.5s ease;
        }

        .tree-leaves.growing {
            fill: #3a9a3a;
            animation: growLeaf 0.8s ease;
        }

        @keyframes growLeaf {
            0% {
                transform: scale(0.8);
                opacity: 0.5;
                fill: #1a5a1a;
            }
            100% {
                transform: scale(1);
                opacity: 1;
                fill: #3a9a3a;
            }
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 0.3rem;
        }

        .header-icon {
            font-size: 2.5rem;
            color: #3a9a3a;
            animation: leafSpin 4s ease-in-out infinite;
            text-shadow: 0 0 40px rgba(50, 200, 50, 0.3);
        }

        @keyframes leafSpin {
            0%,
            100% {
                transform: rotate(0deg) scale(1);
                text-shadow: 0 0 40px rgba(50, 200, 50, 0.3);
            }
            50% {
                transform: rotate(15deg) scale(1.1);
                text-shadow: 0 0 70px rgba(50, 200, 50, 0.6);
            }
        }

        h1 {
            font-family: 'Vazirmatn', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(180deg, #5ae05a, #2d8a2d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .sub-title {
            font-family: 'Vazirmatn', sans-serif;
            font-size: 0.95rem;
            color: rgba(100, 220, 100, 0.35);
            font-weight: 300;
            margin-bottom: 2rem;
            letter-spacing: 3px;
        }

        .sub-title i {
            color: #3a9a3a;
            margin: 0 8px;
        }

        /* ===== TIMER ===== */
        .timer-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.2rem;
            margin-bottom: 1.8rem;
        }

        .time-unit {
            background: linear-gradient(145deg, rgba(20, 60, 20, 0.5), rgba(5, 30, 10, 0.7));
            border-radius: 2.2rem;
            padding: 1.4rem 0.5rem 1.1rem;
            border: 1px solid rgba(50, 200, 50, 0.06);
            box-shadow:
                inset 0 4px 30px rgba(0, 0, 0, 0.5),
                0 0 30px rgba(50, 200, 50, 0.02);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .time-unit::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 0%, rgba(50, 255, 50, 0.04), transparent 70%);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .time-unit:hover::before {
            opacity: 1;
        }

        .time-unit:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(50, 200, 50, 0.2);
            box-shadow: 0 20px 60px rgba(50, 200, 50, 0.08), inset 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .time-unit::after {
            content: '🌿';
            position: absolute;
            bottom: 5px;
            right: 5px;
            font-size: 1rem;
            opacity: 0.1;
            animation: none;
        }

        .number {
            font-family: 'Vazirmatn', monospace;
            font-size: 4.5rem;
            font-weight: 900;
            color: #5ae05a;
            letter-spacing: 4px;
            position: relative;
            z-index: 1;
            display: block;
            line-height: 1.1;
            text-shadow: 0 0 40px rgba(50, 200, 50, 0.15), 0 0 80px rgba(50, 200, 50, 0.05);
            font-variant-numeric: tabular-nums;
        }

        .label {
            font-family: 'Vazirmatn', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: rgba(100, 220, 100, 0.3);
            position: relative;
            z-index: 1;
            display: block;
            margin-top: 4px;
            font-weight: 300;
        }

        /* ===== SECONDS PULSE ===== */
        #seconds {
            color: #6aef6a;
            text-shadow:
                0 0 40px rgba(50, 255, 50, 0.3),
                0 0 80px rgba(50, 200, 50, 0.1);
            animation: secondsNature 0.8s ease-in-out infinite alternate;
        }

        @keyframes secondsNature {
            0% {
                text-shadow: 0 0 40px rgba(50, 255, 50, 0.3), 0 0 80px rgba(50, 200, 50, 0.1);
                transform: scale(1);
            }
            100% {
                text-shadow: 0 0 70px rgba(50, 255, 50, 0.6), 0 0 140px rgba(50, 200, 50, 0.3);
                transform: scale(1.04);
            }
        }

        /* ===== FLIP ===== */
        .number.flip {
            animation: flipNature 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes flipNature {
            0% {
                transform: perspective(500px) rotateX(-90deg) scale(0.7);
                opacity: 0.2;
                text-shadow: 0 0 120px rgba(50, 255, 50, 0.8);
            }
            60% {
                transform: perspective(500px) rotateX(10deg) scale(1.06);
            }
            100% {
                transform: perspective(500px) rotateX(0deg) scale(1);
                opacity: 1;
            }
        }

        /* ===== PROGRESS BAR ===== */
        .progress-wrap {
            width: 100%;
            height: 5px;
            background: rgba(30, 80, 30, 0.2);
            border-radius: 10px;
            overflow: hidden;
            margin: 0.3rem 0 1.8rem;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.4);
        }

        .progress-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #1a5a1a, #5ae05a, #3a9a3a, #6aef6a, #1a5a1a);
            background-size: 300% 100%;
            border-radius: 10px;
            animation: progressNature 3s linear infinite;
            transition: width 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 0 50px rgba(50, 255, 50, 0.2);
        }

        @keyframes progressNature {
            0% {
                background-position: 300% 0;
            }
            100% {
                background-position: -300% 0;
            }
        }

        /* ===== STATUS ===== */
        .status {
            font-family: 'Vazirmatn', sans-serif;
            font-size: 1.2rem;
            color: rgba(180, 240, 180, 0.7);
            font-weight: 600;
            letter-spacing: 1px;
            padding: 0.8rem 2rem;
            border-radius: 3rem;
            background: rgba(30, 80, 30, 0.08);
            border: 1px solid rgba(50, 200, 50, 0.06);
            animation: statusNature 3s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes statusNature {
            0%,
            100% {
                border-color: rgba(50, 200, 50, 0.06);
                box-shadow: 0 0 20px rgba(50, 200, 50, 0);
            }
            50% {
                border-color: rgba(50, 200, 50, 0.15);
                box-shadow: 0 0 50px rgba(50, 200, 50, 0.04);
            }
        }

        .status i {
            color: #5ae05a;
            margin: 0 10px;
            animation: dripNature 1.8s ease-in-out infinite;
        }

        @keyframes dripNature {
            0%,
            100% {
                transform: translateY(0) scale(1);
            }
            50% {
                transform: translateY(4px) scale(0.85);
            }
        }

        .status .highlight {
            color: #6aef6a;
            font-weight: 700;
            text-shadow: 0 0 40px rgba(50, 255, 50, 0.25);
        }

        /* ===== CREDIT ===== */
        .credit {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 999;
            font-family: 'Vazirmatn', 'Arial Black', sans-serif;
            font-size: 1.4rem;
            font-weight: 900;
            color: #3a9a3a;
            text-shadow:
                0 0 30px rgba(50, 200, 50, 0.3),
                0 0 60px rgba(50, 200, 50, 0.1);
            background: rgba(10, 30, 10, 0.6);
            padding: 0.6rem 1.8rem;
            border-radius: 2.5rem;
            border: 1px solid rgba(50, 200, 50, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 0 50px rgba(50, 200, 50, 0.02);
            animation: creditNature 3s ease-in-out infinite;
            letter-spacing: 2px;
            transform: rotate(-1.5deg);
            transition: all 0.4s ease;
        }

        .credit:hover {
            transform: rotate(0deg) scale(1.05);
            border-color: rgba(50, 200, 50, 0.3);
            box-shadow: 0 0 80px rgba(50, 200, 50, 0.08);
        }

        @keyframes creditNature {
            0%,
            100% {
                text-shadow: 0 0 30px rgba(50, 200, 50, 0.3), 0 0 60px rgba(50, 200, 50, 0.1);
                border-color: rgba(50, 200, 50, 0.08);
            }
            50% {
                text-shadow: 0 0 60px rgba(50, 255, 50, 0.5), 0 0 120px rgba(50, 200, 50, 0.2);
                border-color: rgba(50, 200, 50, 0.2);
            }
        }

        .credit i {
            margin: 0 10px;
            color: #5ae05a;
            animation: creditLeaf 3s ease-in-out infinite;
        }

        @keyframes creditLeaf {
            0%,
            100% {
                transform: scale(1) rotate(0deg);
            }
            50% {
                transform: scale(1.2) rotate(15deg);
            }
        }

        /* ===== EXPIRED - BLOOM ===== */
        .expired .number {
            color: #7aff7a !important;
            text-shadow: 0 0 70px rgba(50, 255, 50, 0.8), 0 0 140px rgba(50, 200, 50, 0.4) !important;
            animation: bloomFlash 0.8s ease-in-out infinite alternate;
        }

        @keyframes bloomFlash {
            0% {
                text-shadow: 0 0 70px rgba(50, 255, 50, 0.8), 0 0 140px rgba(50, 200, 50, 0.4);
            }
            100% {
                text-shadow: 0 0 120px rgba(50, 255, 50, 1), 0 0 200px rgba(50, 255, 50, 0.6), 0 0 300px rgba(50, 200, 50, 0.3);
            }
        }

        .expired .time-unit {
            border-color: rgba(50, 255, 50, 0.3);
            box-shadow: 0 0 80px rgba(50, 255, 50, 0.08);
        }

        .expired .status {
            color: #7aff7a;
            text-shadow: 0 0 60px rgba(50, 255, 50, 0.5);
            border-color: rgba(50, 255, 50, 0.2);
        }

        .expired .glass-card {
            animation: bloomGlow 1.2s ease-in-out infinite;
        }

        @keyframes bloomGlow {
            0%,
            100% {
                box-shadow: 0 50px 120px rgba(0, 0, 0, 0.6), 0 0 100px rgba(50, 255, 50, 0.08);
            }
            50% {
                box-shadow: 0 50px 120px rgba(0, 0, 0, 0.6), 0 0 200px rgba(50, 255, 50, 0.15);
            }
        }

        .expired .tree-leaves {
            fill: #7aff7a;
            animation: bloomTree 0.8s ease infinite alternate;
        }

        @keyframes bloomTree {
            0% {
                transform: scale(1);
                fill: #7aff7a;
            }
            100% {
                transform: scale(1.05);
                fill: #aaffaa;
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .glass-card {
                padding: 2rem 1.5rem;
                border-radius: 2.5rem;
            }
            .number {
                font-size: 3.5rem;
            }
            .timer-grid {
                gap: 0.8rem;
            }
            .credit {
                font-size: 1.1rem;
                padding: 0.5rem 1.2rem;
                bottom: 18px;
                left: 18px;
            }
            h1 {
                font-size: 1.4rem;
            }
            .status {
                font-size: 1rem;
                padding: 0.6rem 1.5rem;
            }
            .header-icon {
                font-size: 2rem;
            }
            .time-unit {
                padding: 1.1rem 0.3rem 0.9rem;
                border-radius: 1.8rem;
            }
            .tree-container {
                width: 80px;
                height: 100px;
            }
        }

        @media (max-width: 480px) {
            .glass-card {
                padding: 1.5rem 0.8rem 1.8rem;
                border-radius: 2rem;
            }
            .number {
                font-size: 2.5rem;
                letter-spacing: 2px;
            }
            .timer-grid {
                gap: 0.5rem;
            }
            .label {
                font-size: 0.55rem;
                letter-spacing: 2px;
            }
            .credit {
                font-size: 0.8rem;
                padding: 0.3rem 0.8rem;
                bottom: 12px;
                left: 12px;
                letter-spacing: 1px;
                border-radius: 1.5rem;
            }
            .credit i {
                margin: 0 5px;
            }
            .status {
                font-size: 0.8rem;
                padding: 0.4rem 1rem;
            }
            h1 {
                font-size: 1rem;
            }
            .header-icon {
                font-size: 1.5rem;
            }
            .header {
                gap: 8px;
            }
            .sub-title {
                font-size: 0.65rem;
                margin-bottom: 1.2rem;
                letter-spacing: 1px;
            }
            .time-unit {
                padding: 0.8rem 0.2rem 0.7rem;
                border-radius: 1.2rem;
            }
            .progress-wrap {
                height: 4px;
                margin: 0.3rem 0 1.2rem;
            }
            .tree-container {
                width: 60px;
                height: 80px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== LEAVES ===== -->
    <div class="leaves-container">
        <div class="leaf">🍃</div>
        <div class="leaf">🌿</div>
        <div class="leaf">🍀</div>
        <div class="leaf">🌱</div>
        <div class="leaf">🍃</div>
        <div class="leaf">🌿</div>
        <div class="leaf">🍀</div>
        <div class="leaf">🌱</div>
    </div>

    <!-- ===== BIRDS ===== -->
    <div class="birds">
        <div class="bird">🐦</div>
        <div class="bird">🕊️</div>
        <div class="bird">🐦</div>
    </div>

    <!-- ===== CREDIT ===== -->
    <div class="credit">
        <i class="fas fa-tree"></i>
        ساخته شده با سیک عمیق
        <i class="fas fa-tree"></i>
    </div>

    <!-- ===== MAIN CARD ===== -->
    <div class="glass-card" id="app">
        <!-- TREE SVG -->
        <div class="tree-container">
            <svg viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg">
                <!-- Trunk -->
                <rect x="52" y="80" width="16" height="55" rx="3" class="tree-trunk" />
                <!-- Branches & Leaves -->
                <ellipse cx="60" cy="35" rx="50" ry="45" class="tree-leaves" id="treeLeaves" />
                <ellipse cx="40" cy="50" rx="30" ry="25" class="tree-leaves" />
                <ellipse cx="80" cy="50" rx="30" ry="25" class="tree-leaves" />
                <ellipse cx="60" cy="20" rx="20" ry="18" class="tree-leaves" />
                <!-- Small fruits/flowers -->
                <circle cx="45" cy="30" r="3" fill="#ffd700" opacity="0.6" />
                <circle cx="75" cy="35" r="3" fill="#ffd700" opacity="0.6" />
                <circle cx="60" cy="15" r="2.5" fill="#ffd700" opacity="0.6" />
            </svg>
        </div>

        <!-- HEADER -->
        <div class="header">
            <i class="fas fa-tree header-icon"></i>
            <h1>درخت زمان</h1>
            <i class="fas fa-tree header-icon" style="animation-delay:0.7s;"></i>
        </div>

        <p class="sub-title">
            <i class="fas fa-calendar-alt"></i>
            ۲۰ جولای ۲۰۲۶ — ۱۷:۰۰
            <i class="fas fa-clock"></i>
        </p>

        <!-- TIMER -->
        <div class="timer-grid">
            <div class="time-unit">
                <span class="number" id="days">۰۰</span>
                <span class="label">روز</span>
            </div>
            <div class="time-unit">
                <span class="number" id="hours">۰۰</span>
                <span class="label">ساعت</span>
            </div>
            <div class="time-unit">
                <span class="number" id="minutes">۰۰</span>
                <span class="label">دقیقه</span>
            </div>
            <div class="time-unit">
                <span class="number" id="seconds">۰۰</span>
                <span class="label">ثانیه</span>
            </div>
        </div>

        <!-- PROGRESS -->
        <div class="progress-wrap">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- STATUS -->
        <div class="status" id="statusMessage">
            <i class="fas fa-leaf"></i>
            طبیعت منتظر توست...
            <i class="fas fa-leaf"></i>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ===== TARGET: 20 July 2026, 17:00 IRST =====
            const TARGET = new Date('2026-07-20T17:00:00+03:30');

            const daysEl = document.getElementById('days');
            const hoursEl = document.getElementById('hours');
            const minutesEl = document.getElementById('minutes');
            const secondsEl = document.getElementById('seconds');
            const progressBar = document.getElementById('progressBar');
            const statusMsg = document.getElementById('statusMessage');
            const appCard = document.getElementById('app');
            const treeLeaves = document.getElementById('treeLeaves');

            let prev = {
                days: '--',
                hours: '--',
                minutes: '--',
                seconds: '--'
            };

            function pad(n) {
                return String(n).padStart(2, '0');
            }

            function animateElement(el, value, prevValue) {
                if (value !== prevValue) {
                    el.textContent = value;
                    el.classList.remove('flip');
                    void el.offsetWidth;
                    el.classList.add('flip');
                } else {
                    el.textContent = value;
                }
            }

            // ===== INSPIRATIONAL MESSAGES =====
            const messages = [
                '🌱 طبیعت منتظر توست...',
                '🍃 هر ثانیه یک برگ جدید',
                '🌿 به جنگل ایده‌ها خوش آمدی',
                '🌸 زمان رشد فرا رسیده',
                '🌳 درخت زمان در حال شکوفه‌ست',
                '🍀 امروز روز شروع کار است',
                '🌾 الناز باید شروع کنیم به کار!',
                '🌻 بیا به جنگل کارهای ناتمام سر بزنیم'
            ];

            let msgIndex = 0;

            function updateTimer() {
                const now = new Date();
                const diffMs = TARGET.getTime() - now.getTime();

                // ===== EXPIRED =====
                if (diffMs <= 0) {
                    daysEl.textContent = '۰۰';
                    hoursEl.textContent = '۰۰';
                    minutesEl.textContent = '۰۰';
                    secondsEl.textContent = '۰۰';
                    progressBar.style.width = '100%';

                    // نمایش پیام‌های پایانی با تنوع
                    const finalMessages = [
                        '🌸 الناز! وقت شروع کار است!',
                        '🌳 درخت زمان شکوفه زد!',
                        '🔥 بریم که جنگل کارها منتظر ماست!',
                        '🚀 الناز، زمان حرکت!'
                    ];
                    const finalMsg = finalMessages[Math.floor(now.getTime() / 3000) % finalMessages.length];

                    statusMsg.innerHTML = `
                        <i class="fas fa-seedling"></i>
                        <span style="color:#7aff7a; font-weight:700;">${finalMsg}</span>
                        <i class="fas fa-seedling"></i>
                    `;
                    appCard.classList.add('expired');

                    // برگ‌های درخت سبزتر و درخشان‌تر
                    treeLeaves.setAttribute('fill', '#7aff7a');
                    treeLeaves.style.filter = 'drop-shadow(0 0 30px rgba(100,255,100,0.4))';
                    return;
                }

                appCard.classList.remove('expired');

                // ===== CALCULATE =====
                const totalSec = Math.floor(diffMs / 1000);
                const days = Math.floor(totalSec / 86400);
                const hours = Math.floor((totalSec % 86400) / 3600);
                const minutes = Math.floor((totalSec % 3600) / 60);
                const seconds = totalSec % 60;

                const dStr = pad(days);
                const hStr = pad(hours);
                const mStr = pad(minutes);
                const sStr = pad(seconds);

                animateElement(daysEl, dStr, prev.days);
                animateElement(hoursEl, hStr, prev.hours);
                animateElement(minutesEl, mStr, prev.minutes);
                animateElement(secondsEl, sStr, prev.seconds);

                prev.days = dStr;
                prev.hours = hStr;
                prev.minutes = mStr;
                prev.seconds = sStr;

                // ===== PROGRESS =====
                const startRange = new Date('2026-01-01T00:00:00+03:30');
                const endRange = TARGET;
                const totalRangeMs = endRange.getTime() - startRange.getTime();
                const elapsedMs = now.getTime() - startRange.getTime();
                let progress = Math.min(elapsedMs / totalRangeMs, 1);
                progress = Math.max(progress, 0);
                progressBar.style.width = (progress * 100) + '%';

                // ===== TREE GROWTH EFFECT =====
                // با نزدیک شدن به موعد، درخت پربرگ‌تر و سبزتر می‌شود
                const leafIntensity = 0.3 + (progress * 0.7);
                const green = Math.round(100 + (155 * progress));
                treeLeaves.setAttribute('fill', `rgb(30, ${green}, 30)`);
                treeLeaves.style.filter = `drop-shadow(0 0 ${20 + (progress * 30)}px rgba(50,200,50,${0.1 + (progress * 0.3)}))`;

                // ===== CHANGE MESSAGE EVERY 10 SECONDS =====
                if (Math.floor(now.getTime() / 10000) > Math.floor((now.getTime() - 1000) / 10000)) {
                    msgIndex = (msgIndex + 1) % messages.length;
                }

                let msg = messages[msgIndex];

                // اضافه کردن چند جمله خاص با توجه به زمان باقی‌مانده
                if (days > 30) {
                    msg = '🌳 درخت زمان در حال رشد...';
                } else if (days > 10) {
                    msg = '🍃 برگ‌ها در حال رویش هستند...';
                } else if (days > 3) {
                    msg = '🌸 به زودی شکوفه می‌زند!';
                } else if (days > 0) {
                    msg = `🌿 فقط ${days} روز مونده، الناز آماده‌ای؟`;
                } else if (hours > 0) {
                    msg = `⏳ ${hours} ساعت تا شروع کار!`;
                } else {
                    msg = '🔥 الناز، وقتشه!';
                }

                statusMsg.innerHTML = `
                    <i class="fas fa-leaf"></i>
                    ${msg}
                    <i class="fas fa-leaf"></i>
                `;
            }

            // ===== START =====
            updateTimer();
            setInterval(updateTimer, 1000);

            document.addEventListener('visibilitychange', function() {
                if (!document.hidden) updateTimer();
            });

        })();
    </script>

</body>
</html>
